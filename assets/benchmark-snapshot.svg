<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340" role="img" aria-labelledby="title desc">
  <title id="title">Reality Slap benchmark snapshot</title>
  <desc id="desc">Measured A/B results only: smoke, tradeoff, TS-03 targeted recheck, finance, and domain matrix all show baseline and skill strong pass rates, with pair delta and verdict.</desc>
  <rect width="980" height="340" fill="#ffffff"/>
  <text x="32" y="40" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Benchmark snapshot</text>
  <text x="32" y="66" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4b5563">Measured results only. No unscored domain is shown as a win.</text>

  <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151" font-weight="700">
    <text x="32" y="106">Run</text>
    <text x="280" y="106">Scenarios</text>
    <text x="390" y="106">Baseline strong</text>
    <text x="540" y="106">+Skill strong</text>
    <text x="690" y="106">Pair delta</text>
    <text x="805" y="106">Verdict</text>
  </g>

  <line x1="32" y1="118" x2="948" y2="118" stroke="#e5e7eb" stroke-width="1"/>

  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#111827">
    <text x="32" y="148">Smoke sample</text>
    <text x="310" y="148">4</text>
    <text x="430" y="148">100%</text>
    <text x="580" y="148">100%</text>
    <text x="720" y="148">0.000</text>
    <rect x="805" y="130" width="124" height="26" rx="6" fill="#dbeafe"/>
    <text x="819" y="148" font-size="13" fill="#1e40af">No regression</text>

    <text x="32" y="188">Tradeoff bank</text>
    <text x="310" y="188">8</text>
    <text x="430" y="188">100%</text>
    <text x="580" y="188">100%</text>
    <text x="716" y="188">-0.125</text>
    <rect x="805" y="170" width="104" height="26" rx="6" fill="#fef3c7"/>
    <text x="821" y="188" font-size="13" fill="#92400e">Regression</text>

    <text x="32" y="228">TS-03 recheck</text>
    <text x="310" y="228">1</text>
    <text x="430" y="228">100%</text>
    <text x="580" y="228">100%</text>
    <text x="720" y="228">0.000</text>
    <rect x="805" y="210" width="112" height="26" rx="6" fill="#dcfce7"/>
    <text x="819" y="228" font-size="13" fill="#166534">Targeted fix</text>

    <text x="32" y="268">Finance and trading</text>
    <text x="310" y="268">8</text>
    <text x="430" y="268">100%</text>
    <text x="580" y="268">100%</text>
    <text x="720" y="268">0.000</text>
    <rect x="805" y="250" width="124" height="26" rx="6" fill="#dbeafe"/>
    <text x="819" y="268" font-size="13" fill="#1e40af">No regression</text>

    <text x="32" y="308">Domain matrix</text>
    <text x="306" y="308">20</text>
    <text x="430" y="308">100%</text>
    <text x="580" y="308">100%</text>
    <text x="716" y="308">-0.050</text>
    <rect x="805" y="290" width="100" height="26" rx="6" fill="#fef3c7"/>
    <text x="821" y="308" font-size="13" fill="#92400e">Mixed</text>
  </g>

  <g stroke="#f3f4f6" stroke-width="1">
    <line x1="32" y1="160" x2="948" y2="160"/>
    <line x1="32" y1="200" x2="948" y2="200"/>
    <line x1="32" y1="240" x2="948" y2="240"/>
    <line x1="32" y1="280" x2="948" y2="280"/>
    <line x1="32" y1="320" x2="948" y2="320"/>
  </g>
</svg>
