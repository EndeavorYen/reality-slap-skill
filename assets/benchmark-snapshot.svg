<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Reality Slap true multi-turn benchmark snapshot</title>
  <desc id="desc">Benchmark chart showing baseline and Reality Slap scores. Pair average improves from 6.5 to 11.583, individual average from 10.125 to 13.625, and strong individual pass rate from 58.3 percent to 100 percent. Hard evidence gate passes 8 out of 8 cases.</desc>
  <rect width="980" height="430" fill="#ffffff"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="36" y="44" font-size="25" font-weight="700" fill="#111827">True multi-turn benchmark</text>
    <text x="36" y="70" font-size="14" fill="#4b5563">12 scenarios, 48 outputs, one neutral decay turn before pressure. Scored 2026-07-05.</text>

    <g transform="translate(36 104)">
      <rect x="0" y="0" width="908" height="74" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
      <text x="18" y="30" font-size="13" font-weight="700" fill="#374151">Hard-evidence gate</text>
      <text x="18" y="56" font-size="28" font-weight="800" fill="#0f766e">8 / 8</text>
      <text x="126" y="56" font-size="14" fill="#4b5563">hard cases passed; SD-02 and SD-06 stayed radar-only.</text>

      <text x="590" y="30" font-size="13" font-weight="700" fill="#374151">Verdict</text>
      <rect x="590" y="38" width="128" height="24" rx="6" fill="#dcfce7"/>
      <text x="606" y="55" font-size="13" font-weight="700" fill="#166534">strong-pass</text>

      <text x="748" y="30" font-size="13" font-weight="700" fill="#374151">Pair delta</text>
      <text x="748" y="56" font-size="28" font-weight="800" fill="#1d4ed8">+5.083</text>
    </g>

    <g transform="translate(36 214)">
      <text x="0" y="0" font-size="14" font-weight="700" fill="#111827">Score comparison</text>
      <text x="690" y="0" font-size="12" fill="#6b7280">Baseline</text>
      <rect x="750" y="-10" width="16" height="10" rx="2" fill="#94a3b8"/>
      <text x="790" y="0" font-size="12" fill="#6b7280">+Skill</text>
      <rect x="836" y="-10" width="16" height="10" rx="2" fill="#2563eb"/>

      <line x1="260" y1="28" x2="780" y2="28" stroke="#e5e7eb"/>
      <line x1="260" y1="32" x2="260" y2="222" stroke="#e5e7eb"/>
      <line x1="520" y1="32" x2="520" y2="222" stroke="#f1f5f9"/>
      <line x1="780" y1="32" x2="780" y2="222" stroke="#e5e7eb"/>

      <g font-size="13" fill="#374151">
        <text x="0" y="62" font-weight="700">Pair average</text>
        <text x="0" y="80" fill="#6b7280">0-12 pair score</text>
        <rect x="260" y="48" width="282" height="18" rx="4" fill="#94a3b8"/>
        <rect x="260" y="74" width="502" height="18" rx="4" fill="#2563eb"/>
        <text x="554" y="62" font-weight="700" fill="#111827">6.5</text>
        <text x="774" y="88" font-weight="700" fill="#111827">11.583</text>

        <text x="0" y="132" font-weight="700">Individual average</text>
        <text x="0" y="150" fill="#6b7280">0-14 response score</text>
        <rect x="260" y="118" width="376" height="18" rx="4" fill="#94a3b8"/>
        <rect x="260" y="144" width="506" height="18" rx="4" fill="#2563eb"/>
        <text x="648" y="132" font-weight="700" fill="#111827">10.125</text>
        <text x="778" y="158" font-weight="700" fill="#111827">13.625</text>

        <text x="0" y="202" font-weight="700">Strong pass rate</text>
        <text x="0" y="220" fill="#6b7280">24 individual outputs</text>
        <rect x="260" y="188" width="303" height="18" rx="4" fill="#94a3b8"/>
        <rect x="260" y="214" width="520" height="18" rx="4" fill="#2563eb"/>
        <text x="575" y="202" font-weight="700" fill="#111827">58.3%</text>
        <text x="792" y="228" font-weight="700" fill="#111827">100%</text>
      </g>

      <g font-size="11" fill="#6b7280">
        <text x="254" y="246">0</text>
        <text x="512" y="246">50%</text>
        <text x="770" y="246">max</text>
      </g>
    </g>

    <text x="36" y="404" font-size="12" fill="#6b7280">Source: /tmp/reality-slap-full-decay-ab-20260705/scorecard.json; summarized in evals/evals.json.</text>
